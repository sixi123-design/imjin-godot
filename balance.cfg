WORKER_SPD = 70.0  ; 일꾼 이동 속도
WARN_TIME = 45.0  ; 공세 예고 표시 시간(초)
SPAWN_GAP = 0.07  ; 일반 공세 스폰 간격(초) — 조밀
SPAWN_GAP_FINAL = 0.05  ; 최종 공세 스폰 간격(초)
ENEMY_HP_GROWTH = 0.08; 공세 차수당 적 체력 증가율
ENEMY_DMG_GROWTH = 0.05; 공세 차수당 적 공격력 증가율
ENEMY_COUNT_GROWTH = 0.04; 공세 차수당 적 수 증가율
LORD_AURA = 4.0  ; 왜장 버프 반경(타일)
LORD_DMG_BUFF = 1.5  ; 왜장 버프: 주변 적 공격력 배율
LORD_SUMMON_CD = 5.0  ; 왜장 강령술 주기(초)
LORD_SUMMON_N = 20  ; 왜장 강령술 소환 수(왜병)
LORD_SUMMON_MAX = 20  ; 왜장 1명당 강령술 최대 횟수
AOE_FALLOFF = 0.2  ; 범위 공격 가장자리 감쇠 (0.65 = 가장자리 35% 피해)
HUNTER_HP_MIN = 60.0  ; 편전수 대물 특효 기준(적 최대체력)
GAPSA_BLOCK_R = 16.0  ; 갑사 길막 반경(px)
ENEMY_BUILD_BLOCK = 1.0  ; 적이 이 거리(타일) 안이면 건설 불가 (0 = 제한 없음)
SPAWN_SPREAD = 0.11  ; 스폰 산개 폭 (클수록 측면에 넓게 퍼짐)
EVENT_CHANCE = 0.1  ; 공세 격퇴 후 랜덤 이벤트 발생 확률 (0~1)
WORK_SFX_MAX = 3  ; 생산 작업음 동시 재생 최대 개수
WORK_SFX_VOL = -16.0  ; 생산 작업음 볼륨(dB, 낮을수록 작음)
APPROACH_SPREAD = 60.0  ; 개체 접근 산개(px) — 클수록 안 뭉침
ENEMY_SEP = 13.0  ; 적끼리 최소 간격(px) — 겹침·범위공격 한방전멸 방지
ENRAGE_START = 45.0  ; 공세 시작 후 이 시간(초) 지나면 광폭화 시작
ENRAGE_RATE = 0.06  ; 광폭화: 초당 남은 적 공격력 증가율
ENRAGE_SPD = 0.03  ; 광폭화: 초당 이속 증가율
LORD_SPD_BUFF = 1.2  ; 왜장 버프: 주변 적 이속 배율
BOMBER_AOE = 3  ; 폭탄병 폭발 반경(타일)
BOMBER_DMG = 130.0  ; 폭탄병 폭발 피해
RES_BATK = 0.15  ; 공방 연구: 건물 공격 +15%/Lv
RES_BDEF = 0.20  ; 공방 연구: 건물 피해감소 +20%/Lv
RES_UATK = 0.15  ; 공방 연구: 유닛 공격 +15%/Lv
RES_UDEF = 0.12  ; 공방 연구: 유닛 피해감소 +12%/Lv
RES_MAX_LV = 10  ; 연구 최대 레벨
RES_COST_WOOD = 200  ; 연구 기본 비용(목재) × (Lv+1)
RES_COST_IRON = 140  ; 연구 기본 비용(철) × (Lv+1)
FLOAT_EVERY = 4.0  ; 생산량 표시 주기(초)
SPEAR_CLEAVE = 1.15  ; 창병·갑사 근접 범위 공격 반경(타일)
select_all_key = "F2"  ; 전군 선택 단축키 (예: "F2", "Q")

