; ============================================================
; 불멸의 성채: 임진왜란 — 밸런스 설정 파일 (사용자 전용)
; 이 파일은 김초롱 님이 직접 수정하는 파일입니다. Claude는 건드리지 않습니다.
; 게임 시작 시 로드되며, 잘못된 키/섹션은 무시되고 화면 좌하단에 경고가 뜹니다.
; 파일이 아예 깨져도 게임은 코드 기본값으로 실행됩니다.
;
; 규칙: 소수는 28.0 처럼, 정수는 5 처럼 적기 · 사거리/반경은 *_tiles(타일 단위)
; 비용/생산/전리품: cost_food cost_wood cost_iron / prod_food... / loot_food...
; ============================================================

[global]
DAY_LEN = 28.0  ; 하루 길이(초)
START_FOOD = 150.0  ; 시작 식량
START_WOOD = 220.0  ; 시작 목재
START_IRON = 80.0  ; 시작 철
FREE_ARCHERS = 1  ; 시작 무료 궁수 수
CAM_SPEED = 1100.0  ; WASD 카메라 이동 속도(px/초)
WORKER_SPD = 70.0  ; 일꾼 이동 속도
WARN_TIME = 45.0  ; 공세 예고 표시 시간(초)
SPAWN_GAP = 0.06  ; 일반 공세 스폰 간격(초)
SPAWN_GAP_FINAL = 0.11  ; 최종 공세 스폰 간격(초)
ENEMY_HP_GROWTH = 0.24  ; 공세 차수당 적 체력 증가율 (7%씩 누적)
ENEMY_DMG_GROWTH = 0.18  ; 공세 차수당 적 공격력 증가율
ENEMY_COUNT_GROWTH = 0.15  ; 공세 차수당 적 수 증가율
LORD_AURA = 4.0  ; 왜장 버프 반경(타일)
LORD_DMG_BUFF = 1.5  ; 왜장 버프: 주변 적 공격력 배율
LORD_SPD_BUFF = 1.2  ; 왜장 버프: 주변 적 이속 배율
BOMBER_AOE = 1.5  ; 폭탄병 폭발 반경(타일)
BOMBER_DMG = 300.0  ; 폭탄병 폭발 피해
RES_BATK = 0.15  ; 공방 연구: 건물 공격 +15%/Lv
RES_BDEF = 0.20  ; 공방 연구: 건물 피해감소 +20%/Lv
RES_UATK = 0.15  ; 공방 연구: 유닛 공격 +15%/Lv
RES_UDEF = 0.12  ; 공방 연구: 유닛 피해감소 +12%/Lv
RES_MAX_LV = 10  ; 연구 최대 레벨
RES_COST_WOOD = 200  ; 연구 기본 비용(목재) × (Lv+1)
RES_COST_IRON = 140  ; 연구 기본 비용(철) × (Lv+1)
FLOAT_EVERY = 4.0  ; 생산량 표시 주기(초)
SPEAR_CLEAVE = 1.15  ; 창병·갑사 근접 범위 공격 반경(타일)
select_all_key = "F2"  ; 전군 선택 단축키 (예: "F2", "Q")

